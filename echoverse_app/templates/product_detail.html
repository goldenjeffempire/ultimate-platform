<h2>{{ product.name }}</h2>
<p>{{ product.description }}</p>

<h3>Reviews:</h3>
<ul>
    {% for review in reviews %}
        <li>
            <strong>{{ review.user.username }}:</strong>
            <p>Rating: {{ review.rating }} - {{ review.review_text }}</p>
        </li>
    {% endfor %}
</ul>

<a href="{% url 'submit_product_review' product.id %}">Write a review</a>
