<h1>Create an Ad</h1>
<form method="post">
    {% csrf_token %}
    <label for="product_name">Product Name:</label>
    <input type="text" name="product_name" required>

    <label for="target_audience">Target Audience:</label>
    <input type="text" name="target_audience" required>

    <label for="ad_type">Ad Type (e.g., Social Media, Google Ads):</label>
    <input type="text" name="ad_type" required>

    <button type="submit">Generate Ad</button>
</form>
