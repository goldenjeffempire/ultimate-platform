<h1>Marketplace</h1>

{% for product in products %}
    <div class="product">
        <h2>{{ product.name }}</h2>
        <p>{{ product.description }}</p>
        <p>Price: ${{ product.price }}</p>
        <p>Stock: {{ product.stock }}</p>
        <a href="{% url 'product_detail' product.id %}">View Product</a>
    </div>
{% endfor %}
