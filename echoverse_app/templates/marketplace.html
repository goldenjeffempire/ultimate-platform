<h1>Marketplace</h1>
<div>
    {% for product in products %}
        <div class="product">
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
            <h2>{{ product.name }}</h2>
            <p>{{ product.description }}</p>
            <p>Price: ${{ product.price }}</p>
            <p>Stock: {{ product.stock }}</p>
            <a href="{% url 'product_detail' product.id %}">View Details</a>
        </div>
    {% endfor %}
</div>
